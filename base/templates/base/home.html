{% extends 'main.html' %}
{% block content %}

    <body>
        <div class="chat-container">
            <div class="chat-header">
                <h1>🤖 FAQ Chatbot</h1>
                <p class="subtitle">CodeAlpha AI Internship — Task 2</p>
            </div>

            <div id="chat-window" class="chat-window">
                <div class="message bot">
                    <div class="bubble">Hi! Ask me anything about our course platform — enrollment, payments, certificates, and more.</div>
                </div>
            </div>

            <div class="quick-chips">
                {% for q in sample_questions %}
                    <button class="chip" data-question="{{ q }}">{{ q }}</button>
                {% endfor %}
            </div>

            <form id="chat-form" class="chat-input-row">
                {% csrf_token %}
                <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>

        <script>
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            const csrftoken = getCookie('csrftoken');

            const chatWindow = document.getElementById('chat-window');
            const chatForm = document.getElementById('chat-form');
            const userInput = document.getElementById('user-input');

            function addMessage(text, sender) {
                const msg = document.createElement('div');
                msg.className = `message ${sender}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;
                msg.appendChild(bubble);
                chatWindow.appendChild(msg);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            async function askQuestion(question) {
                addMessage(question, 'user');
                userInput.value = '';

                const typing = document.createElement('div');
                typing.className = 'message bot';
                typing.innerHTML = '<div class="bubble typing">...</div>';
                chatWindow.appendChild(typing);
                chatWindow.scrollTop = chatWindow.scrollHeight;

                try {
                    const res = await fetch("{% url 'ask' %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrftoken,
                        },
                        body: JSON.stringify({ question }),
                    });
                    const data = await res.json();
                    typing.remove();
                    addMessage(data.answer || data.error || 'Something went wrong.', 'bot');
                } catch (err) {
                    typing.remove();
                    addMessage('Network error — please try again.', 'bot');
                }
            }

            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const question = userInput.value.trim();
                if (question) askQuestion(question);
            });

            document.querySelectorAll('.chip').forEach((chip) => {
                chip.addEventListener('click', () => askQuestion(chip.dataset.question));
            });
        </script>
    </body>
{% endblock %}
